<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 414" width="760" height="414" role="img"><rect width="760" height="414" rx="16" fill="#f5fafb" stroke="#dce7ea"/><rect x="0" y="0" width="8" height="414" rx="4" fill="#204e8f"/><text x="34" y="50" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="22" font-weight="800" fill="#204e8f">이 글의 흐름</text><circle cx="48" cy="84" r="20" fill="#204e8f"/><text x="48" y="91" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="19" font-weight="800" fill="#fff">1</text><text x="88" y="91" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="20" font-weight="600" fill="#1c2733">보험료 할증은 무엇으로 정해지나</text><line x1="48" y1="104" x2="48" y2="130" stroke="#4f8fd6" stroke-width="3"/><circle cx="48" cy="150" r="20" fill="#204e8f"/><text x="48" y="157" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="19" font-weight="800" fill="#fff">2</text><text x="88" y="157" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="20" font-weight="600" fill="#1c2733">할증기준점수와 물적사고 할증기준금액</text><line x1="48" y1="170" x2="48" y2="196" stroke="#4f8fd6" stroke-width="3"/><circle cx="48" cy="216" r="20" fill="#204e8f"/><text x="48" y="223" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="19" font-weight="800" fill="#fff">3</text><text x="88" y="223" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="20" font-weight="600" fill="#1c2733">사고건수 요율과 3년 평가기간</text><line x1="48" y1="236" x2="48" y2="262" stroke="#4f8fd6" stroke-width="3"/><circle cx="48" cy="282" r="20" fill="#204e8f"/><text x="48" y="289" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Got