<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 414" width="760" height="414" role="img"><rect width="760" height="414" rx="16" fill="#f5fafb" stroke="#dce7ea"/><rect x="0" y="0" width="8" height="414" rx="4" fill="#0c5f6b"/><text x="34" y="50" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="22" font-weight="800" fill="#0c5f6b">이 글의 흐름</text><circle cx="48" cy="84" r="20" fill="#0c5f6b"/><text x="48" y="91" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="19" font-weight="800" fill="#fff">1</text><text x="88" y="91" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="20" font-weight="600" fill="#1c2733">고지의무란 정확히 무엇을 알리는 의무인가</text><line x1="48" y1="104" x2="48" y2="130" stroke="#13a3a8" stroke-width="3"/><circle cx="48" cy="150" r="20" fill="#0c5f6b"/><text x="48" y="157" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="19" font-weight="800" fill="#fff">2</text><text x="88" y="157" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="20" font-weight="600" fill="#1c2733">최근 3개월·1년·5년 — 무엇을 물어보나</text><line x1="48" y1="170" x2="48" y2="196" stroke="#13a3a8" stroke-width="3"/><circle cx="48" cy="216" r="20" fill="#0c5f6b"/><text x="48" y="223" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="19" font-weight="800" fill="#fff">3</text><text x="88" y="223" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="20" font-weight="600" fill="#1c2733">위반하면 해지·부지급, 그러나 예외가 있다</text><line x1="48" y1="236" x2="48" y2="262" stroke="#13a3a8" stroke-width="3"/><circle cx="48" cy="282" r="20" fill="#0c5f6b"/><text x="48" y="289" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="19" font-weight="800" fill="#fff">4</text><text x="88" y="289" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="20" font-weight="600" fill="#1c2733">청약서를 정확히 쓰는 5단계</text><line x1="48" y1="302" x2="48" y2="328" stroke="#13a3a8" stroke-width="3"/><circle cx="48" cy="348" r="20" fill="#0c5f6b"/><text x="48" y="355" text-anchor="middle" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="19" font-weight="800" fill="#fff">5</text><text x="88" y="355" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕',sans-serif" font-size="20" font-weight="600" fill="#1c2733">정리: ‘사실대로, 질문한 범위대로’가 핵심입니다</text></svg>
